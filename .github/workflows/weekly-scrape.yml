name: Weekly Feature Scrape & Deploy

on:
  # Run every Monday at 10:00 UTC (after Atlassian publishes their weekly notes)
  schedule:
    - cron: '0 10 * * 1'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill all historical weeks (true/false)'
        required: false
        default: 'false'

  # Also run when pushing to main (for initial setup / config changes)
  push:
    branches: [main]
    paths-ignore:
      - 'src/content/docs/**'
      - 'data/features/**'

permissions:
  contents: write   # needed to commit updated data back to repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            npm run scrape:backfill
          else
            npm run scrape
          fi

      - name: Generate Astro pages from scraped data
        run: node scripts/generate-pages.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ src/content/docs/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data and pages
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ src/content/docs/
          git commit -m "chore: weekly scrape $(date -u '+%Y-%m-%d')"
          git push

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: scrape-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
